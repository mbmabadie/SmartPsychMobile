name: smart_psych
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.2.0+3

environment:
  sdk: ^3.8.1

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  chatbot_ai:
     path: ./chatbot_ai

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  # State Management
  provider: ^6.1.5
  # get_it: ^8.2.0  # غير مستخدم حالياً
  # go_router: ^16.1.0  # غير مستخدم حالياً - يستخدم Navigator مباشرة

  # Database & Storage
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3

  # Sensors & Hardware Access
  sensors_plus: ^6.1.1
  pedometer: ^4.1.1
  light: ^4.1.0
  #noise_meter: any
  # battery_plus: ^6.2.2  # غير مستخدم حالياً
  device_info_plus: ^11.5.0

  # Location & Maps
  # location: ^8.0.1  # غير مستخدم - يُستخدم geolocator بدلاً منه
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  # animate_do: ^3.3.4  # غير مستخدم حالياً

  flutter_screenutil: ^5.9.3
  usage_stats: ^1.3.1
  # Permissions Management
  permission_handler: ^12.0.1

  android_intent_plus: ^5.3.1

  # Background Services & Tasks
  workmanager: any
  flutter_background_service: ^5.1.0

  # Notifications
  flutter_local_notifications: any
  #awesome_notifications: ^0.10.0
  app_usage: ^4.0.1
  #installed_apps: ^1.6.0

  # Charts & Data Visualization
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: ^30.1.39
  syncfusion_flutter_gauges: ^30.1.39

  # UI Enhancements & Animation
  # animated_text_kit: ^4.2.3  # غير مستخدم حالياً
  # lottie: ^3.3.1  # غير مستخدم حالياً
  # flutter_staggered_grid_view: ^0.7.0  # غير مستخدم حالياً
  # flutter_slidable: ^4.0.0  # غير مستخدم حالياً
  # shimmer: ^3.0.0  # غير مستخدم حالياً
  # smooth_page_indicator: ^1.2.1  # غير مستخدم حالياً

  # Internationalization & Localization
  intl: ^0.20.0
  flutter_localizations:
    sdk: flutter

  # Network & HTTP
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.4

  # File Handling & Export
  # csv: ^6.0.0  # غير مستخدم حالياً
  share_plus: ^11.0.0
  # open_file: ^3.5.10  # غير مستخدم حالياً

  # Image & Media
  # image_picker: ^1.1.2  # غير مستخدم حالياً
  # cached_network_image: ^3.4.1  # غير مستخدم حالياً

  # Utils & Helpers
  # uuid: ^4.5.1  # غير مستخدم حالياً
  # crypto: ^3.0.6  # غير مستخدم حالياً
  # collection: ^1.19.1  # غير مستخدم حالياً

  # Date & Time
  timezone: ^0.10.1

  # Math & Calculations
  # vector_math: any  # غير مستخدم حالياً

  # Platform Integration
  app_settings: ^6.1.1
  url_launcher: ^6.3.2

  # Security & Encryption
  # encrypt: ^5.0.3  # غير مستخدم حالياً

  # Performance & Monitoring
  # flutter_native_splash: ^2.4.6  # غير مستخدم حالياً

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting & Code Quality
  flutter_lints: any
  very_good_analysis: any

  # Code Generation (غير مستخدم حالياً - لا يوجد ملفات .g.dart)
  # build_runner: ^2.5.4
  # json_annotation: ^4.9.0
  # json_serializable: ^6.9.5

  # Testing
  mockito: ^5.4.6
  integration_test:
    sdk: flutter

  # Icons & Assets Generation
  flutter_launcher_icons: ^0.14.4


# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  generate: false

  assets:
    - assets/data/insights_messages.json
